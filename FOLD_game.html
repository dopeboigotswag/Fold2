<body>
<canvas id="c"></canvas>
<div id="ui">A / D = Move &nbsp;|&nbsp; Space = Jump &nbsp;|&nbsp; Hold F + Mouse = Fold Preview &nbsp;|&nbsp; Release F = Execute Fold &nbsp;|&nbsp; R = Unfold</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

function resize() {
  const maxW = Math.min(window.innerWidth - 20, 820);
  const maxH = Math.min(window.innerHeight - 60, 520);
  const ratio = Math.min(maxW / W, maxH / H);
  canvas.width  = Math.floor(W * ratio);
  canvas.height = Math.floor(H * ratio);
}
resize();
window.addEventListener('resize', resize);
function sc() { return canvas.width / W; }

// ── Sprite setup ─────────────────────────────────────────
const FRAME_W = 128, FRAME_H = 128, FRAME_COUNT = 8;
let spriteReady = false;
let spriteCanvas = null;

const rawImg = new Image();
rawImg.onload = function() {
  const oc = document.createElement('canvas');
  oc.width  = rawImg.width;
  oc.height = rawImg.height;
  const oc2 = oc.getContext('2d');
  oc2.drawImage(rawImg, 0, 0);
  const imageData = oc2.getImageData(0, 0, oc.width, oc.height);
  const d = imageData.data;
  // Remove black background: if pixel is very dark, make transparent
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    const brightness = 0.299*r + 0.587*g + 0.114*b;
    if (brightness < 30) d[i+3] = 0;
    else if (brightness < 60) d[i+3] = Math.round(((brightness - 30) / 30) * 255);
  }
  oc2.putImageData(imageData, 0, 0);
  spriteCanvas = oc;
  spriteReady = true;
};

    ps:{x:50,y:375},
    platforms:[
      {x:0,  y:420,w:180,h:20,fp:false},
      {x:380,y:300,w:120,h:15,fp:false},
      {x:600,y:420,w:200,h:20,fp:false},
      {x:640,y:320,w:100,h:15,fp:false},
      {x:70, y:310,w:90, h:15,fp:false},
    ],
    hazards:[{x:180,y:400,w:200,h:22}],
    cranes:[{x:100,y:290,ok:false},{x:390,y:282,ok:false}],
    exit:{x:660,y:300},
  },
  {
    name:'1-3  Paper Thorns',
    hint:'Fold to bypass the spikes — precise axis placement matters',
    ps:{x:45,y:375},
    platforms:[
      {x:0,  y:420,w:150,h:20,fp:false},
      {x:200,y:360,w:100,h:15,fp:false},
      {x:400,y:290,w:100,h:15,fp:false},
      {x:580,y:220,w:110,h:15,fp:false},
      {x:670,y:360,w:130,h:20,fp:false},
      {x:600,y:420,w:200,h:20,fp:false},
    ],
    hazards:[
      {x:155,y:395,w:45,h:25},
      {x:300,y:335,w:100,h:25},
      {x:500,y:265,w:80,h:25},
    ],
    cranes:[{x:590,y:203,ok:false}],
    exit:{x:695,y:338},
  },
];

function resetLevel(i) {
  const lv = LEVELS[i];
  player = {x:lv.ps.x,y:lv.ps.y,w:22,h:36,vx:0,vy:0,onGround:false};
  folded=false; foldMode=false; foldAxis=W/2;
  foldCount=0; timer=0; timerOn=false;
  frameIdx=0; frameTimer=0; facingLeft=false; jumpAnimHold=1000;
  lv.cranes.forEach(c=>c.ok=false);
}

function effectivePlatforms() {
  const lv = LEVELS[levelIdx];
  if (!folded) return lv.platforms;
  const eff = [];
  for (const p of lv.platforms) {
    if (p.fp) {
      if (p.x < foldAxis) eff.push({...p, w: Math.min(p.x+p.w,foldAxis)-p.x});
      continue;
    }
    if (p.x < foldAxis) {
      const w = Math.min(p.x+p.w,foldAxis)-p.x;
      if (w>0) eff.push({...p,w});
    }
    if (p.x+p.w > foldAxis) {
      const lx=Math.max(p.x,foldAxis),rx=p.x+p.w,sw=rx-lx,mx=2*foldAxis-rx;
      if (mx+sw>0) eff.push({...p,x:mx,w:sw,mirrored:true});
    }
  }
  return eff;
}

function mirrorX(x,w) { return (folded && x>foldAxis) ? 2*foldAxis-x-w : x; }
function overlap(ax,ay,aw,ah,bx,by,bw,bh) { return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by; }

function resolveCollisions(plats) {
  player.onGround = false;
  for (const p of plats) {
    if (!overlap(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h)) continue;
    const ol=(player.x+player.w)-p.x, or_=(p.x+p.w)-player.x;
    const ot=(player.y+player.h)-p.y, ob=(p.y+p.h)-player.y;
    const mn=Math.min(ol,or_,ot,ob);
    if      (mn===ot&&player.vy>=0) { player.y=p.y-player.h; player.vy=0; player.onGround=true; }
    else if (mn===ob&&player.vy<=0) { player.y=p.y+p.h; player.vy=0; }
    else if (mn===ol)               { player.x=p.x-player.w; player.vx=0; }
    else                            { player.x=p.x+p.w; player.vx=0; }
  }
}

// ── Update ────────────────────────────────────────────────
function update() {
  if (state!=='playing') return;
  const lv = LEVELS[levelIdx];
  if (timerOn) timer += 1/60;

  const axPrev = Math.max(60, Math.min(W-60, mouseX));
  if (keys['KeyF']&&!folded) { foldMode=true; foldAxis=axPrev; }
  if (foldMode&&!keys['KeyF']) {
    foldMode=false; folded=true; foldCount++; timerOn=true;
    if (player.x+player.w>foldAxis) player.x=foldAxis-player.w-2;
  }
  if (keys['KeyR']) folded=false;

  player.vx=0;
  if (keys['KeyA']||keys['ArrowLeft'])  { player.vx=-SPEED; facingLeft=true;  }
  if (keys['KeyD']||keys['ArrowRight']) { player.vx= SPEED; facingLeft=false; }
  if ((keys['Space']||keys['ArrowUp'])&&player.onGround) { player.vy=JUMP_V; player.onGround=false; jumpAnimHold=1000; frameIdx=1; frameTimer=0; }

  player.vy=Math.min(player.vy+GRAVITY,16);
  player.x+=player.vx; player.y+=player.vy;
  if (folded&&player.x+player.w>foldAxis) player.x=foldAxis-player.w-1;
  player.x=Math.max(0,Math.min(player.x,W-player.w));
  resolveCollisions(effectivePlatforms());

  // sprite animation
  const isMoving = Math.abs(player.vx) > 0.01;
  if (jumpAnimHold > 0) {
    jumpAnimHold--;
  } else if (!player.onGround) {
    frameIdx = 1;
    frameTimer = 0;
  } else if (isMoving) {
    frameTimer++;
    if (frameTimer>=FRAME_SPEED) { frameTimer=0; frameIdx=(frameIdx+1)%FRAME_COUNT; }
  } else {
    frameIdx = 0;
    frameTimer = 0;
  }

  if (player.y>H+80) { resetLevel(levelIdx); return; }

  for (const h of lv.hazards) {
    const hx=mirrorX(h.x,h.w);
    if (folded&&hx>foldAxis) continue;
    if (overlap(player.x,player.y,player.w,player.h,hx,h.y,h.w,h.h)) { resetLevel(levelIdx); return; }
  }
  for (const c of lv.cranes) {
    if (c.ok) continue;
    const cx=(folded&&c.x>foldAxis)?2*foldAxis-c.x:c.x;
    if (folded&&cx>foldAxis) continue;
    if (overlap(player.x,player.y,player.w,player.h,cx-12,c.y-12,24,24)) c.ok=true;
  }
  const ex=lv.exit;
  const exX=(folded&&ex.x>foldAxis)?2*foldAxis-ex.x:ex.x;
  if (!folded||exX<foldAxis) {
    if (overlap(player.x,player.y,player.w,player.h,exX-16,ex.y-16,32,32)) {
      if (levelIdx<LEVELS.length-1) { levelIdx++; resetLevel(levelIdx); }
      else state='win';
    }
  }
}

// ── Draw helpers ──────────────────────────────────────────
function drawCrane(cx,cy,sz,col) {
  const s=sc();
  ctx.save(); ctx.translate(cx*s,cy*s); ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(0,-sz*s); ctx.lineTo(sz*.6*s,sz*.2*s); ctx.lineTo(0,sz*.5*s); ctx.lineTo(-sz*.6*s,sz*.2*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-sz*.6*s,sz*.2*s); ctx.lineTo(-sz*1.1*s,-sz*.3*s); ctx.lineTo(0,sz*.5*s); ctx.fill();
  ctx.beginPath(); ctx.moveTo(sz*.6*s,sz*.2*s);  ctx.lineTo(sz*1.1*s,-sz*.3*s);  ctx.lineTo(0,sz*.5*s); ctx.fill();
  ctx.restore();
}

function drawPlatform(p) {
  const s=sc(), x=p.x*s, y=p.y*s, w=p.w*s, h=p.h*s;
  ctx.fillStyle = p.mirrored?'#c8a060':(p.fp?'#334466':'#7a5c10');
  ctx.fillRect(x,y,w,h);
  ctx.fillStyle = p.mirrored?'#e0c070':(p.fp?'#6688bb':'#9a7220');
  ctx.fillRect(x,y,w,3*s);
  if (!p.fp) {
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
    for (let xi=x+20*s;xi<x+w;xi+=20*s) { ctx.beginPath(); ctx.moveTo(xi,y); ctx.lineTo(xi,y+h); ctx.stroke(); }
  } else {
    ctx.strokeStyle='#5588ee'; ctx.lineWidth=1.5*s; ctx.strokeRect(x,y,w,h);
  }
}

function drawSpike(hx,hy,hw,hh) {
  const s=sc();
  ctx.fillStyle='#aa2200'; ctx.fillRect(hx*s,hy*s,hw*s,hh*s);
  ctx.fillStyle='#ff3311';
  for (let xi=hx*s;xi<(hx+hw)*s;xi+=10*s) {
    ctx.beginPath(); ctx.moveTo(xi,hy*s); ctx.lineTo(xi+5*s,hy*s-10*s); ctx.lineTo(xi+10*s,hy*s); ctx.fill();
  }
}

function drawPlayer() {
  const s=sc();
  const px=player.x*s, py=player.y*s, pw=player.w*s, ph=player.h*s;

  if (spriteReady && spriteCanvas) {
    ctx.save();
    // Render sprite frame, mirrored if facing left
    const sx = frameIdx * FRAME_W;
    const destW = pw * 2.2;   // slightly wider than hitbox so it looks good
    const destH = ph * 1.35;
    const destX = px + pw/2 - destW/2;
    const destY = py + ph - destH;

    if (facingLeft) {
      ctx.translate(destX + destW, destY);
      ctx.scale(-1, 1);
      ctx.drawImage(spriteCanvas, sx, 0, FRAME_W, FRAME_H, 0, 0, destW, destH);
    } else {
      ctx.drawImage(spriteCanvas, sx, 0, FRAME_W, FRAME_H, destX, destY, destW, destH);
    }
    ctx.restore();
  } else {
    // Fallback placeholder
    ctx.fillStyle='#1a0e04'; ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle='#ffcc44';
    ctx.beginPath(); ctx.arc(px+pw/2,py+5*s,6*s,0,Math.PI*2); ctx.fill();
  }
}

function drawBG() {
  ctx.fillStyle='#f5e6c8'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(180,150,100,0.22)'; ctx.lineWidth=0.5;
  const s=sc();
  for (let x=0;x<W;x+=20) { ctx.beginPath(); ctx.moveTo(x*s,0); ctx.lineTo(x*s,H*s); ctx.stroke(); }
  for (let y=0;y<H;y+=20) { ctx.beginPath(); ctx.moveTo(0,y*s); ctx.lineTo(W*s,y*s); ctx.stroke(); }
}

function drawHUD() {
  const s=sc(), lv=LEVELS[levelIdx];
  ctx.save(); ctx.scale(s,s);
  ctx.fillStyle='rgba(12,7,1,0.80)'; ctx.fillRect(0,0,W,34);
  ctx.fillStyle='#f5e6c8'; ctx.font='bold 13px MyCustomFont';
  ctx.fillText(`Folds: ${foldCount}`,14,22);
  const mm=String(Math.floor(timer/60)).padStart(2,'0'), ss2=String(Math.floor(timer%60)).padStart(2,'0');
  ctx.textAlign='right'; ctx.fillText(`${mm}:${ss2}`,W-14,22); ctx.textAlign='left';
  const got=lv.cranes.filter(c=>c.ok).length;
  ctx.fillStyle='#d4a020'; ctx.textAlign='center';
  ctx.fillText(`✦ ${got}/${lv.cranes.length}   ${lv.name}`,W/2,22);
  ctx.textAlign='left';
  if (folded) {
    ctx.fillStyle='rgba(12,7,1,0.65)'; ctx.fillRect(W-118,38,114,24);
    ctx.fillStyle='#ffaa44'; ctx.font='11px MyCustomFont'; ctx.fillText('Press R to Unfold',W-108,54);
  }
  ctx.restore();
}

function rrect(x,y,w,h,r,fill,stroke) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if (fill) { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle=stroke; ctx.lineWidth=1.5; ctx.stroke(); }
}

function drawMenu() {
  const s=sc();
  drawBG();
  ctx.save(); ctx.scale(s,s);
  rrect(185,80,430,330,8,'rgba(15,8,2,0.84)','#c4a35a');
  ctx.fillStyle='#7a6040'; ctx.font='bold 13px MyCustomFont'; ctx.textAlign='center';
  ctx.fillText('START MENU',W/2,118);
  ctx.fillStyle='#c4a35a'; ctx.font='bold 56px MyCustomFont';
  ctx.fillText('FOLD',W/2,178);
  ctx.fillStyle='#a09070'; ctx.font='13px MyCustomFont';
  ctx.fillText('Fold the world. Repair the Folio.',W/2,218);
  ctx.fillStyle='#7a6040'; ctx.font='12px MyCustomFont';
  ['A / D  —  Move','Space  —  Jump','Hold F + Mouse  —  Fold preview','Release F  —  Execute fold','R  —  Unfold','Esc  —  Pause Menu'].forEach((l,i)=>ctx.fillText(l,W/2,248+i*20));
  ctx.fillStyle='#00cc66'; ctx.font='bold 15px MyCustomFont';
  ctx.fillText('Press  ENTER  to begin',W/2,372);
  ctx.textAlign='left'; ctx.restore();
  
}

function drawPause() {
  drawGame();
  const s=sc();
  ctx.save(); ctx.scale(s,s);
  ctx.fillStyle='rgba(8,4,1,0.58)';
  ctx.fillRect(0,0,W,H);
  rrect(210,120,380,240,8,'rgba(15,8,2,0.90)','#c4a35a');
  ctx.fillStyle='#7a6040'; ctx.font='bold 13px MyCustomFont'; ctx.textAlign='center';
  ctx.fillText('PAUSE MENU',W/2,156);
  ctx.fillStyle='#c4a35a'; ctx.font='bold 42px MyCustomFont';
  ctx.fillText('Paused',W/2,210);
  ctx.fillStyle='#f5e6c8'; ctx.font='13px MyCustomFont';
  ctx.fillText('Press ESC to resume',W/2,258);
  ctx.fillText('Press ENTER to restart this level',W/2,286);
  ctx.fillText('Press M to return to start menu',W/2,314);
  ctx.textAlign='left';
  ctx.restore();
}

function drawWin() {
  const s=sc();
  drawBG();
  ctx.save(); ctx.scale(s,s);
  rrect(140,80,520,330,8,'rgba(0,18,6,0.86)','#00cc66');
  ctx.fillStyle='#00cc66'; ctx.font='bold 40px MyCustomFont'; ctx.textAlign='center';
  ctx.fillText('World Repaired!',W/2,182);
  ctx.fillStyle='#f5e6c8'; ctx.font='15px MyCustomFont';
  ctx.fillText('You have mastered the art of folding.',W/2,230);
  ctx.fillText('The Architect is pleased.',W/2,260);
  ctx.fillStyle='#c4a35a'; ctx.font='14px MyCustomFont';
  ctx.fillText('Press ENTER to return to menu',W/2,372);
  ctx.textAlign='left'; ctx.restore();
  drawCrane(W/2,H*0.6,20,'#00cc66');
}

function drawGame() {
  drawBG();
  const lv=LEVELS[levelIdx];
  const s=sc();
  const axPrev=Math.max(60,Math.min(W-60,mouseX));

  if (foldMode) {
    ctx.save(); ctx.scale(s,s);
    ctx.fillStyle='rgba(80,60,20,0.2)'; ctx.fillRect(axPrev,0,W-axPrev,H);
    ctx.globalAlpha=0.28;
    for (const p of lv.platforms) {
      if (p.fp) continue;
      if (p.x+p.w>axPrev) {
        const lx=Math.max(p.x,axPrev),rx=p.x+p.w,sw=rx-lx,mx=2*axPrev-rx;
        ctx.fillStyle='#c8a060'; ctx.fillRect(mx,p.y,sw,p.h);
      }
    }
    ctx.globalAlpha=1;
    ctx.strokeStyle='#e06020'; ctx.lineWidth=2/s;
    ctx.setLineDash([8/s,4/s]);
    ctx.beginPath(); ctx.moveTo(axPrev,0); ctx.lineTo(axPrev,H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#8b2500'; ctx.font=`bold ${13/s}px MyCustomFont`; ctx.textAlign='center';
    ctx.fillText('Release F to fold here',axPrev,28/s);
    ctx.textAlign='left'; ctx.restore();
  }

  if (folded) {
    ctx.save(); ctx.scale(s,s);
    ctx.fillStyle='rgba(90,60,20,0.42)'; ctx.fillRect(foldAxis,0,W-foldAxis,H);
    ctx.strokeStyle='#7a3a0a'; ctx.lineWidth=3/s;
    ctx.beginPath(); ctx.moveTo(foldAxis,0); ctx.lineTo(foldAxis,H); ctx.stroke();
    ctx.restore();
  }

  for (const p of effectivePlatforms()) drawPlatform(p);
  for (const h of lv.hazards) {
    let hx=mirrorX(h.x,h.w);
    if (folded&&hx>foldAxis) continue;
    drawSpike(hx,h.y,h.w,h.h);
  }
  for (const c of lv.cranes) {
    if (c.ok) continue;
    const cx=(folded&&c.x>foldAxis)?2*foldAxis-c.x:c.x;
    if (folded&&cx>foldAxis) continue;
    drawCrane(cx,c.y,9,'#d4a020');
  }
  const ex=lv.exit;
  const exX=(folded&&ex.x>foldAxis)?2*foldAxis-ex.x:ex.x;
  if (!folded||exX<foldAxis) {
    drawCrane(exX,ex.y,14,'#00dd66');
    ctx.save();
    ctx.strokeStyle='rgba(0,220,100,0.3)'; ctx.lineWidth=6*s;
    ctx.beginPath(); ctx.arc(exX*s,ex.y*s,18*s,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  drawPlayer();
  drawHUD();

  if (timer<7) {
    ctx.save(); ctx.scale(s,s);
    ctx.fillStyle='rgba(10,6,2,0.68)'; ctx.fillRect(0,H-38,W,38);
    ctx.fillStyle='#e0cfaa'; ctx.font='12px MyCustomFont'; ctx.textAlign='center';
    ctx.fillText(lv.hint,W/2,H-12);
    ctx.textAlign='left'; ctx.restore();
  }
}

document.addEventListener('keydown', e => {
  if (e.code==='Escape') {
    if (state==='playing') {
      lastNonPauseState = 'playing';
      state='paused';
    } else if (state==='paused') {
      state=lastNonPauseState;
    }
  }
  if (e.code==='Enter') {
    if      (state==='menu') { state='playing'; levelIdx=0; resetLevel(0); }
    else if (state==='paused') { resetLevel(levelIdx); state='playing'; }
    else if (state==='win')  { state='menu'; }
  }
  if (state==='paused' && e.code==='KeyM') {
    state='menu';
  }
});

function loop() {
  update();
  if      (state==='menu')    drawMenu();
  else if (state==='paused')  drawPause();
  else if (state==='win')     drawWin();
  else                        drawGame();
  requestAnimationFrame(loop);
}
loop();
</script>
